openapi: 3.0.1
info:
  title: Ranking Info API
  version: v1
  description: |
    API for retrieving German tennis ranking listings (DTB).

    ## Authentication
    All endpoints require a Bearer token in the `Authorization` header:
    ```
    Authorization: Bearer <your-token>
    ```

    ## Age Group Slugs
    The `age_group_slug` path parameter encodes both gender and age group:

    | Slug  | Description        |
    |-------|--------------------|
    | m00   | Herren (men)       |
    | w00   | Damen (women)      |
    | mu18  | Junioren U18       |
    | mu16  | Junioren U16       |
    | mu14  | Junioren U14       |
    | mu12  | Junioren U12       |
    | wu18  | Juniorinnen U18    |
    | wu16  | Juniorinnen U16    |
    | wu14  | Juniorinnen U14    |
    | wu12  | Juniorinnen U12    |

servers:
  - url: /
    description: Current server

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: API token configured via Rails credentials (api.tokens) or ENV[API_BEARER_TOKEN]

  schemas:
    PlayerLinks:
      type: object
      description: HAL-style hypermedia links
      properties:
        self:
          type: string
          format: uri
          description: URL of the player detail resource
          example: /api/v1/players/10712345

    RankingEntry:
      type: object
      properties:
        dtb_id:
          type: integer
          description: Unique player identifier (DTB ID)
          example: 10712345
        ranking_position:
          type: integer
          description: Position in the ranking
          example: 1
        lastname:
          type: string
          example: Mustermann
        firstname:
          type: string
          example: Max
        nationality:
          type: string
          maxLength: 3
          example: GER
        club:
          type: string
          example: TC Musterclub
        federation:
          type: string
          description: Federation short code
          example: BAD
        score:
          type: string
          description: Ranking score (points as string)
          example: "1234"
        position_change:
          type: integer
          nullable: true
          description: >
            Change in position compared to the previous quarter.
            Positive = moved up, negative = moved down, null = no previous entry.
          example: 2
        links:
          $ref: '#/components/schemas/PlayerLinks'

    PlayerSummary:
      type: object
      description: Condensed player record returned by the search endpoint
      properties:
        dtb_id:
          type: integer
          example: 10712345
        lastname:
          type: string
          example: Mustermann
        firstname:
          type: string
          example: Max
        club:
          type: string
          example: TC Musterclub
        links:
          $ref: '#/components/schemas/PlayerLinks'

    RankingHistoryEntry:
      type: object
      description: One ranking entry in a player's history
      properties:
        quarter:
          type: string
          format: date
          description: First day of the ranking quarter
          example: "2026-04-01"
        age_group:
          type: string
          description: Age group slug (e.g. m00, U18)
          example: m00
        ranking_position:
          type: integer
          example: 1
        score:
          type: string
          example: "1234"

    PlayerDetail:
      type: object
      description: Full player record including ranking history
      properties:
        dtb_id:
          type: integer
          example: 10712345
        lastname:
          type: string
          example: Mustermann
        firstname:
          type: string
          example: Max
        nationality:
          type: string
          maxLength: 3
          example: GER
        club:
          type: string
          example: TC Musterclub
        federation:
          type: string
          example: BAD
        rankings:
          type: array
          items:
            $ref: '#/components/schemas/RankingHistoryEntry'

    SearchRequestBlock:
      type: object
      description: Echo of the applied search parameters plus total result count
      properties:
        lastname:
          type: string
          description: The lastname search term as submitted
          example: Mustermann
        yob:
          type: string
          nullable: true
          description: Year of birth filter as submitted, null if not provided
          example: "2008"
        total_count:
          type: integer
          description: Total number of matching players
          example: 3

    PlayersSearchResponse:
      type: object
      properties:
        request:
          $ref: '#/components/schemas/SearchRequestBlock'
        data:
          type: array
          items:
            $ref: '#/components/schemas/PlayerSummary'

    PlayerDetailResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/PlayerDetail'

    RequestBlock:
      type: object
      description: Echo of the applied request parameters plus total result count
      properties:
        quarter:
          type: string
          format: date
          example: "2026-04-01"
        age_group:
          type: string
          example: m00
        age_group_options:
          type: string
          nullable: true
          enum: [only_yob, include_younger, null]
        federation:
          type: string
          nullable: true
          example: BAD
        club:
          type: string
          nullable: true
          example: TC Musterclub
        year_end:
          type: boolean
          example: false
        page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 25
        total_count:
          type: integer
          description: Total number of matching records (ignoring pagination)
          example: 312

    ListingsResponse:
      type: object
      properties:
        request:
          $ref: '#/components/schemas/RequestBlock'
        data:
          type: array
          items:
            $ref: '#/components/schemas/RankingEntry'

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Unauthorized

paths:
  /api/v1/listings/{quarter}/{age_group_slug}:
    get:
      summary: Retrieve ranking listings
      description: >
        Returns a paginated, filtered list of ranking entries for the given quarter
        and age group. Results are ordered by ranking position ascending.
      operationId: getListings
      tags:
        - Listings
      parameters:
        - name: quarter
          in: path
          required: true
          description: >
            First day of the ranking quarter (YYYY-MM-DD).
            Use the date as stored in the database (e.g. 2026-04-01 for Q1 2026).
          schema:
            type: string
            format: date
          example: "2026-04-01"

        - name: age_group_slug
          in: path
          required: true
          description: >
            Encodes gender and age group. Prefix `m` = male, `w` = female.
            Suffix `00` = adult, `u{age}` = youth age group.
          schema:
            type: string
            pattern: '^[mw](00|u\d{2})$'
          example: m00

        - name: federation
          in: query
          required: false
          description: Filter by federation short code (exact match)
          schema:
            type: string
          example: BAD

        - name: club
          in: query
          required: false
          description: Filter by club name (case-insensitive partial match)
          schema:
            type: string
          example: TC Musterclub

        - name: age_group_options
          in: query
          required: false
          description: >
            Sub-filter for youth age group entries.
            `only_yob` returns only players ranked by year of birth.
            `include_younger` includes players ranked despite being younger than the age group.
          schema:
            type: string
            enum: [only_yob, include_younger]

        - name: year_end
          in: query
          required: false
          description: >
            Set to `1` to retrieve year-end rankings instead of regular quarterly rankings.
            Only effective when `quarter` is a Q1 date (YYYY-01-01).
          schema:
            type: string
            enum: ["0", "1"]
            default: "0"

        - name: page
          in: query
          required: false
          description: Page number (1-based)
          schema:
            type: integer
            minimum: 1
            default: 1

        - name: per_page
          in: query
          required: false
          description: Number of results per page. Capped at 100.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25

      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingsResponse'
              example:
                request:
                  quarter: "2026-04-01"
                  age_group: m00
                  age_group_options: null
                  federation: BAD
                  club: null
                  year_end: false
                  page: 1
                  per_page: 25
                  total_count: 87
                data:
                  - dtb_id: 10712345
                    ranking_position: 1
                    lastname: Mustermann
                    firstname: Max
                    nationality: GER
                    club: TC Musterclub
                    federation: BAD
                    score: "1234"
                    position_change: 2
                  - dtb_id: 10712346
                    ranking_position: 2
                    lastname: Beispiel
                    firstname: Anna
                    nationality: GER
                    club: TC Beispiel
                    federation: BAD
                    score: "1180"
                    position_change: null

        "401":
          description: Unauthorized — missing or invalid Bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/players:
    get:
      summary: Search players by lastname
      description: >
        Returns players whose lastname matches the search term (case-insensitive, partial match).
        An optional `yob` (year of birth, YYYY) further narrows the results.
        Returns 404 when no matching player is found.
      operationId: searchPlayers
      tags:
        - Players
      parameters:
        - name: lastname
          in: query
          required: true
          description: Lastname to search for (partial, case-insensitive)
          schema:
            type: string
          example: Mustermann

        - name: yob
          in: query
          required: false
          description: Year of birth (YYYY) to narrow results
          schema:
            type: string
            pattern: '^\d{4}$'
          example: "2008"

      responses:
        "200":
          description: One or more matching players found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayersSearchResponse'
              example:
                data:
                  - dtb_id: 10712345
                    lastname: Mustermann
                    firstname: Max
                    club: TC Musterclub
                    links:
                      self: /api/v1/players/10712345

        "400":
          description: Bad request — lastname parameter missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

        "401":
          description: Unauthorized — missing or invalid Bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

        "404":
          description: No player found for the given search criteria
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/players/{id}:
    get:
      summary: Retrieve player detail by DTB ID
      description: >
        Returns basic player data and the full ranking history across all age groups
        (regular quarterly rankings only; year-end, YOB, and age-group-ranking entries are excluded).
        Returns 404 when the DTB ID is unknown.
      operationId: getPlayer
      tags:
        - Players
      parameters:
        - name: id
          in: path
          required: true
          description: DTB ID of the player
          schema:
            type: integer
          example: 10712345

      responses:
        "200":
          description: Player found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerDetailResponse'
              example:
                data:
                  dtb_id: 10712345
                  lastname: Mustermann
                  firstname: Max
                  nationality: GER
                  club: TC Musterclub
                  federation: BAD
                  rankings:
                    - quarter: "2026-04-01"
                      age_group: m00
                      ranking_position: 1
                      score: "1234"
                    - quarter: "2025-10-01"
                      age_group: m00
                      ranking_position: 3
                      score: "1100"

        "401":
          description: Unauthorized — missing or invalid Bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

        "404":
          description: Player not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
